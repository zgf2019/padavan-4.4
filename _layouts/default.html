        .markdown-body table { border-spacing: 0; border-collapse: collapse; display: block; width: max-content; max-width: 100%; overflow: auto; margin-top: 0; margin-bottom: 16px; font-size: 0.9em; }
        .markdown-body table th, .markdown-body table td { padding: 8px 10px; border: 1px solid var(--border-color); }
        .markdown-body table tr { background-color: var(--card-bg); border-top: 1px solid var(--border-color); }
        .markdown-body table tr:nth-child(2n) { background-color: rgba(0,0,0,0.02); }
        [data-theme="dark"] .markdown-body table tr:nth-child(2n) { background-color: rgba(255,255,255,0.02); }
        .markdown-body table th { font-weight: bold; background-color: rgba(0,0,0,0.03); text-align: left; }
        .heading-with-anchor { position: relative; }
        .heading-with-anchor .anchor { float: left; padding-right: 4px; margin-left: -20px; line-height: 1; visibility: hidden; text-decoration: none; outline: none; }
        .heading-with-anchor:hover .anchor, .heading-with-anchor .anchor:focus { visibility: visible; }
        .anchor svg { fill: var(--link-color); vertical-align: middle; visibility: visible; }
        @media (max-width: 600px) { .header-section h1 { font-size: 1.5em; } .header-section p { font-size: 1em; } .poetic-subtitle { font-size: 1.05em; text-align: center; } .poetic-line .code-block { white-space: normal !important; max-width: 100%; box-sizing: border-box; line-height: 1.5; padding: 6px 10px !important; display: inline-block; } .poetic-part { display: inline-block; } .hero-title-3 { flex-wrap: wrap; } .desktop-inline { display: block; margin-top: 5px; } .markdown-body { padding: 20px; } }
        .glow-text { -webkit-text-fill-color: currentColor !important; color: var(--color-you); font-weight: bold; text-shadow: 0 0 2px rgba(5, 80, 174, 0.2); transition: text-shadow 0.3s ease, color 0.3s ease; animation: starTwinkleLight 4s linear infinite; }
        [data-theme="dark"] .glow-text { -webkit-text-fill-color: currentColor !important; color: var(--color-dave-taht); text-shadow: 0 0 6px rgba(88, 166, 255, 0.6), 0 0 15px rgba(88, 166, 255, 0.2); transition: text-shadow 0.3s ease, color 0.3s ease; animation: starTwinkleDark 4s linear infinite; }
        a.glow-text:hover, .glow-text:hover { animation-duration: 1s !important; }
        @keyframes starTwinkleLight { 0%, 100% { opacity: 1; text-shadow: 0 0 5px rgba(5, 80, 174, 0.2); } 25% { opacity: 0.8; text-shadow: 0 0 6px rgba(5, 80, 174, 0.5); } }
        @keyframes starTwinkleDark { 0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(88, 166, 255, 0.6), 0 0 20px rgba(88, 166, 255, 0.2); } 25% { opacity: 0.8; text-shadow: 0 0 12px rgba(88, 166, 255, 0.8), 0 0 24px rgba(88, 166, 255, 0.4); } }
        a.gradient-text:hover, .gradient-text:hover { animation: flowGradient 2.5s linear infinite !important; filter: brightness(1.15) drop-shadow(0 0 6px rgba(253, 145, 121, 0.4)); }
        @keyframes flowGradient { 0% { background-position: 0% 20%; } 100% { background-position: 200% 20%; } }
        .emoji { -webkit-text-fill-color: initial !important; background: none !important; color: initial !important; }
        .emoji-WinOS { -webkit-text-fill-color: currentColor !important; background: none !important; color: currentColor !important; }
        html { position: relative; min-height: 100%; }
        html::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background-image: linear-gradient(94.23deg, var(--color-nebula-1) 0%, var(--color-nebula-1) 12.41%, var(--color-nebula-2) 52.55%, var(--color-nebula-3) 89.95%, var(--color-nebula-1) 100%); background-size: 200% auto; animation: flowGradient 4.1s linear infinite; z-index: 2025; transition: height 0.5s cubic-bezier(.16,1,.3,1), filter 0.8s cubic-bezier(.16,1,.3,1); pointer-events: none; }
        html:hover::after { height: 18px; animation: flowGradient 2.5s linear infinite; filter: brightness(1.4) drop-shadow(0 -8px 20px rgba(253, 145, 121, 0.8)) drop-shadow(0 -15px 40px rgba(255, 105, 105, 0.6)) drop-shadow(0 -25px 60px rgba(83, 116, 250, 0.5)); }
        html:active::after { height: 26px; animation: flowGradient 1.2s linear infinite; filter: brightness(1.8) drop-shadow(0 -15px 35px rgba(253, 145, 121, 1)) drop-shadow(0 -25px 65px rgba(255, 105, 105, 0.9)) drop-shadow(0 -40px 100px rgba(83, 116, 250, 0.8)); }
    </style>
</head>
<body>

    <header class="header-section">
        <h1>
            <a href="./" style="color: inherit; text-decoration: none; font-size: inherit; font-weight: inherit;"><span class="emoji-WinOS">🇹🇼</span> <span class="gradient-text">{{ site.title }}</span></a>
        </h1>
        <p>{{ site.description }}</p>
        <div style="margin-top: 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px;">
            <a href="/" class="btn" style="background-color: transparent; color: var(--text-color) !important; border: 1px solid var(--border-color);">🏛️ 返回 <span class="glow-text">Dave Täht</span> 數位典藏博物館</a>
            
            <a href="{{ site.github_url }}" target="_blank" class="btn" style="background-color: #80C343; border-color: #80C343; color: #111111 !important; transition: background-color 0.3s;" title="Target: Partner with acer!">⭐ 前往 GitHub 開源專案倉庫</a>
        </div>
    </header>

    <main>
        <article class="markdown-body">
            {{ content }}
        </article>
    </main>

    <footer class="footer">
        <div class="memorial-section" style="margin-bottom: 20px; font-size: 0.95em; color: var(--text-color);">
            <p style="margin: 5px 0;">
                ⭐ <span class="glow-text">Dave Täht</span> passed away on <span class="glow-text">2025.04.01</span>. 
                <span style="display: inline-block;">
                    <span class="glow-text">Today</span> is <span id="current-date" class="glow-text"></span>.
                </span>
            </p>
            <p style="margin: 5px 0;">
                🌠 Illuminating the open-source universe for <strong id="total-days" class="glow-text" style="font-size: 1.1em;"></strong> days 
                <span style="display: inline-block; white-space: nowrap; color: var(--text-muted);">
                (<span id="ymd-breakdown"></span>)
                </span>.
            </p>
        </div>
        <p>© <span id="year"></span> TW641. Built with passion for a Bufferbloat-free world.</p>
    </footer>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="切換亮暗色模式" title="切換亮暗色模式">
        🌓
    </button>

    <script>
        const rootElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme');
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
        if(currentTheme === 'dark') {
            rootElement.setAttribute('data-theme', 'dark');
            themeToggleBtn.textContent = '☀️';
        } else if(currentTheme === 'light') {
            rootElement.setAttribute('data-theme', 'light');
            themeToggleBtn.textContent = '🌙';
        } else {
            themeToggleBtn.textContent = prefersDarkScheme.matches ? '☀️' : '🌙';
        }
        themeToggleBtn.addEventListener('click', () => {
            let isDark = rootElement.getAttribute('data-theme') === 'dark' || (!rootElement.hasAttribute('data-theme') && prefersDarkScheme.matches);
            if(isDark) {
                rootElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeToggleBtn.textContent = '🌙';
            } else {
                rootElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.textContent = '☀️';
            }
        });

        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        const currentDay = String(now.getDate()).padStart(2, '0');
        const startDate = new Date('2025-04-01T00:00:00');
        const diffTime = now - startDate;
        const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("year").textContent = currentYear;
        document.getElementById("current-date").textContent = `${currentYear}.${currentMonth}.${currentDay}`;
        if(totalDays >= 0) {
            document.getElementById("total-days").textContent = totalDays;
            let years = currentYear - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            if(days < 0) {
                months--;
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += prevMonth.getDate();
            }
            if(months < 0) {
                years--;
                months += 12;
            }
            let breakdownStr = '';
            if(years > 0) breakdownStr += `<span class="glow-text">${years} 年 (Y)</span> `;
            if(months > 0 || years > 0) breakdownStr += `<span class="glow-text">${months} 個月 (M)</span> `;
            breakdownStr += `<span class="glow-text">${days} 天 (D)</span>`;
            document.getElementById("ymd-breakdown").innerHTML = breakdownStr;
        } else {
            document.getElementById("total-days").textContent = "0";
            document.getElementById("ymd-breakdown").innerHTML = "<span class='glow-text'>0 天 (D)</span>";
        }

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3').forEach(function(heading) {
                heading.classList.add('gradient-text');
                heading.innerHTML = heading.innerHTML.replace(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})\uFE0F?/gu, '<span class="emoji">$1</span>');
            });
            document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6').forEach(function(heading) {
                if (heading.id && !heading.querySelector('.anchor')) {
                    heading.classList.add('heading-with-anchor');
                    let anchor = document.createElement('a');
                    anchor.className = 'anchor';
                    anchor.href = '#' + heading.id;
                    anchor.setAttribute('aria-hidden', 'true');
                    anchor.innerHTML = '<svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path fill-rule="evenodd" d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.829 2.829l-2.5 2.5a2 2 0 01-2.829 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.829l2.5-2.5a2 2 0 012.829 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.829 0z"></path></svg>';
                    heading.prepend(anchor);
                }
            });
            const keywords = ["Dave Täht", "Täht", "Dave", "Michael", "dtaht", "@mtaht", "Dave’s Guitar", "星塵", "星星", "星辰", "Starstuff", "Star"];
            const escapedKw = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).sort((a, b) => b.length - a.length);
            const boundaryPrefix = "(?<![a-zA-Z0-9])";
            const boundarySuffix = "(?![a-zA-Z0-9])";
            const searchRegex = new RegExp(boundaryPrefix + "(" + escapedKw.join("|") + ")" + boundarySuffix, "gi");
            const testRegex = new RegExp(boundaryPrefix + "(" + escapedKw.join("|") + ")" + boundarySuffix, "i");
            const matchRegex = new RegExp("^(" + escapedKw.join("|") + ")$", "i");
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                    if (!node.parentNode) return NodeFilter.FILTER_REJECT;
                    if (node.parentNode.classList && node.parentNode.classList.contains('glow-text')) return NodeFilter.FILTER_REJECT;
                    if (['SCRIPT', 'STYLE', 'TITLE', 'NOSCRIPT'].includes(node.parentNode.nodeName)) return NodeFilter.FILTER_REJECT;
                    if (testRegex.test(node.nodeValue)) return NodeFilter.FILTER_ACCEPT;
                    return NodeFilter.FILTER_SKIP;
                }
            });
            const nodesToReplace = [];
            let currentNode;
            while (currentNode = walker.nextNode()) {
                nodesToReplace.push(currentNode);
            }
            nodesToReplace.forEach(node => {
                if (!node.parentNode) return;
                const fragment = document.createDocumentFragment();
                const parts = node.nodeValue.split(searchRegex);
                parts.forEach(part => {
                    if (matchRegex.test(part)) {
                        const span = document.createElement('span');
                        span.className = 'glow-text';
                        span.textContent = part;
                        fragment.appendChild(span);
                    } else if (part) {
                        fragment.appendChild(document.createTextNode(part));
                    }
                });
                node.parentNode.replaceChild(fragment, node);
            });
        });
    </script>
</body>
</html>
