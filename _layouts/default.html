<body>

    <header class="header-section">
        <h1>
            <a href="{{ site.url }}{{ site.baseurl }}/" style="color: inherit; text-decoration: none; font-size: inherit; font-weight: inherit;">🇹🇼 {{ site.title }}</a>
        </h1>
        <p>{{ site.description }}</p>
        <div style="margin-top: 20px;">
            <a href="https://tw641.github.io/" class="btn" style="background-color: transparent; color: var(--text-color) !important; border: 1px solid var(--border-color); margin-right: 10px;">🏠 返回 TW641 官方首頁</a>
            
            <a href="{{ site.github_url }}" target="_blank" class="btn">⭐ 前往 GitHub 開源專案倉庫</a>
        </div>
    </header>

    <main>
        <article class="markdown-body">
            {{ content }}
        </article>
    </main>

    <footer class="footer">
        <p>© <span id="year"></span> TW641. Built with passion for a Bufferbloat-free world.</p>
    </footer>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="切換亮暗色模式" title="切換亮暗色模式">
        🌓
    </button>

    <script>
        document.getElementById("year").textContent=new Date().getFullYear();
        const themeToggleBtn=document.getElementById('theme-toggle');
        const rootElement=document.documentElement;
        const currentTheme=localStorage.getItem('theme');
        const prefersDarkScheme=window.matchMedia('(prefers-color-scheme: dark)');
        if(currentTheme==='dark'){
            rootElement.setAttribute('data-theme','dark');
            themeToggleBtn.textContent='☀️';
        }else if(currentTheme==='light'){
            rootElement.setAttribute('data-theme','light');
            themeToggleBtn.textContent='🌙';
        }else{
            themeToggleBtn.textContent=prefersDarkScheme.matches?'☀️':'🌙';
        }
        themeToggleBtn.addEventListener('click',()=>{
            let isDark=rootElement.getAttribute('data-theme')==='dark'||(!rootElement.hasAttribute('data-theme')&&prefersDarkScheme.matches);
            if(isDark){
                rootElement.setAttribute('data-theme','light');
                localStorage.setItem('theme','light');
                themeToggleBtn.textContent='🌙';
            }else{
                rootElement.setAttribute('data-theme','dark');
                localStorage.setItem('theme','dark');
                themeToggleBtn.textContent='☀️';
            }
        });

        // 懸浮錨點
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6').forEach(function(heading) {
                if (heading.id) {
                    heading.classList.add('heading-with-anchor');
                    let anchor = document.createElement('a');
                    anchor.className = 'anchor';
                    anchor.href = '#' + heading.id;
                    anchor.setAttribute('aria-hidden', 'true');
                    anchor.innerHTML = '<svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path fill-rule="evenodd" d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.829 2.829l-2.5 2.5a2 2 0 01-2.829 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.829l2.5-2.5a2 2 0 012.829 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.829 0z"></path></svg>';
                    heading.prepend(anchor);
                }
            });
        });
    </script>
