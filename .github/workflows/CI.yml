name: Custom-Router-Build-Final-Fix

on:
  workflow_dispatch:
    inputs:
      target_select:
        description: "選擇機型 (Target Model)"
        required: true
        type: choice
        options:
          - K2P
          - K2P-NANO
          - K2P-USB
          - MI-R3G
          - NEWIFI3
          - RM2100
          # 新增支援清單 (基於 trunk/configs/boards)
          - CR660x
          - DIR-878
          - DIR-882
          - JCG-836PRO
          - JCG-AC860M
          - JCG-Q20
          - JCG-Y2
          - MI-R3P
          - MR2600
          - NETGEAR-BZV
          - XY-C1
        default: K2P

      language_select:
        description: "WebUI 語言設定 (Custom Language Selector)"
        required: true
        type: choice
        default: 'English_Only'
        options:
          - English_Only
          - CN (繁體中文)
          - RU (Pусский)
          - BR (Brazil)
          - CZ (Česky)
          - DA (Dansk)
          - DE (Deutsch)
          - ES (Español)
          - FI (Finsk)
          - FR (Français)
          - NO (Norsk)
          - PL (Polski)
          - SV (Svensk)
          - UK (Українська)
      
      nanoversion:
        description: "開啟極限瘦身 (Nano Optimization)"
        type: boolean
        default: true
      
      customization:
        description: '自訂預設配置 JSON (Custom Default Configuration Wi-Fi/Passwords/IP)'
        required: true
        type: string
        default: '{"lanip":"192.168.0.1","signaccount":"admin","signpassword":"admin","wifi2gssid":"Padavan","wifi2gpsk":"1234567890","wifi5gssid":"Padavan-5G","wifi5gpsk":"1234567890"}'
      
      toolchain_select:
        description: "選擇編譯工具鏈 (Select toolchain)"
        required: true
        type: choice
        options:
          - Default (hanwckf/linux-4.4-v1.0, uclibc)
          - Padavan-NG (GCC 13+, uClibc-ng, ZSTD)
          - TurboTse/musl (gcc 13.3.0, musl 1.2.5)
          - TurboTse/uclibc (gcc 13.3.0, uClibc-ng 1.0.52)
          - tsl0922/musl (gcc 13.2.0, musl 1.2.4)
          - tsl0922/uclibc (gcc 13.2.0, uClibc-ng 1.0.43)
          - hanwckf/uclibc-v1.1 (gcc 7.4.0, uclibc 1.0.32, SO_REUSEPORT patch)
        default: Padavan-NG (GCC 13+, uClibc-ng, ZSTD)

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 📥-Checkout-Repository
        uses: actions/checkout@master
      
      - name: 🚀-Install-Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            unzip cpio 7zip p7zip-full curl wget git zstd \
            build-essential fakeroot flex bison gawk gperf \
            autoconf automake libtool-bin libltdl-dev \
            python3-docutils autopoint gettext texinfo help2man \
            zlib1g-dev liblzma-dev liblzo2-dev \
            libgmp3-dev libmpc-dev libmpfr-dev \
            libncurses5-dev xxd nano cmake pkg-config ccache jq
          # 設定台灣時間 YYYYMMDD-HHMM
          echo "BUILD_TIME=$(TZ='Asia/Taipei' date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          mkdir -p /opt/images/

      - name: 🔎-Export-Custom-Variables
        run: |
          jq empty <<< '${{ inputs.customization }}' || { echo "❌ Invalid JSON"; exit 1; }
          echo '${{ inputs.customization }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r k v; do
            echo "${k^^}=$v" >> $GITHUB_ENV  
          done

      - name: ⬇️-Clone-Source-Code
        run: |
          git clone --depth=1 https://github.com/TWShiyuLiou1997/padavan-4.4.git /opt/rt-n56u

      # =======================================================
      # [步驟 A] 統一準備資源 (只 Clone 一次！)
      # =======================================================
      - name: ⬇️ Prepare Reference Source (padavan-ng)
        run: |
          echo "::group::Clone padavan-ng to /tmp"
          # 確保環境乾淨
          rm -rf /tmp/padavan-ng
          
          # 統一 Clone 到臨時目錄
          git clone --depth=1 https://github.com/TWShiyuLiou1997/padavan-ng.git /tmp/padavan-ng
          
          echo "✅ Reference repo ready at /tmp/padavan-ng"
          echo "::endgroup::"

      # =======================================================
      # [步驟 B] BusyBox 1.37.0 V43: Perfectionist + Logic Upgrade
      # =======================================================
      - name: 🔥 Sync & Evolve BusyBox (V43:Ultimate Logic)
        run: |
          set -x
          echo "::group::BusyBox Evolution V43"
          
          # 1. 定義變數 (Readonly 防止篡改)
          readonly REPO_ROOT="/opt/rt-n56u"
          readonly ORIGINAL_CONFIG="$REPO_ROOT/trunk/configs/boards/busybox.config"
          readonly SOURCE_DIR="/tmp/padavan-ng/trunk/user/busybox"
          readonly TARGET_DIR="$REPO_ROOT/trunk/user/busybox"
          
          readonly SYNC_TARGET_1="$TARGET_DIR/busybox-1.37.0/.config"
          readonly SYNC_TARGET_2="$TARGET_DIR/.config"
          readonly SYNC_TARGET_3="$ORIGINAL_CONFIG"
          
          if [ -z "$SYNC_TARGET_1" ] || [ -z "$SYNC_TARGET_2" ] || [ -z "$SYNC_TARGET_3" ]; then
              echo "❌ CRITICAL: Target paths are empty!"
              exit 1
          fi

          # -------------------------------------------------------
          # 2. 定義全套檢查清單 (MIPS Router Optimized / Diff Mode)
          # -------------------------------------------------------
          CHECKS_SET=(
              # Shells
              "CONFIG_SH_IS_ASH y"
              "CONFIG_BASH_IS_ASH y"
              "CONFIG_ASH y"
              "CONFIG_ASH_OPTIMIZE_FOR_SIZE y"
              "CONFIG_ASH_INTERNAL_GLOB y"
              "CONFIG_ASH_BASH_COMPAT y"
              "CONFIG_ASH_JOB_CONTROL y"
              "CONFIG_ASH_ALIAS y"
              "CONFIG_ASH_EXPAND_PRMT y"
              "CONFIG_ASH_GETOPTS y"
              "CONFIG_ASH_CMDCMD y"
              "CONFIG_ASH_HELP y"
              "CONFIG_ASH_RANDOM_SUPPORT y"
              "CONFIG_ASH_IDLE_TIMEOUT y"
              "CONFIG_ASH_MAIL y"
              "CONFIG_FEATURE_SH_MATH_BASE y"
              "CONFIG_FEATURE_SH_EMBEDDED_SCRIPTS y"
              
              # Logging
              "CONFIG_SYSLOGD y"
              "CONFIG_FEATURE_ROTATE_LOGFILE y"
              "CONFIG_FEATURE_REMOTE_LOG y"
              "CONFIG_FEATURE_SYSLOGD_DUP y"
              "CONFIG_FEATURE_SYSLOGD_PRECISE_TIMESTAMPS y"
              "CONFIG_FEATURE_SYSLOGD_READ_BUFFER_SIZE 512"
              "CONFIG_FEATURE_IPC_SYSLOG y"
              "CONFIG_FEATURE_IPC_SYSLOG_BUFFER_SIZE 4"
              "CONFIG_KLOGD y"
              "CONFIG_FEATURE_KLOGD_KLOGCTL y"
              "CONFIG_LOGGER y"
              
              # Network & DHCP
              "CONFIG_UDHCPC_DEFAULT_INTERFACE \"eth0\""
              "CONFIG_FEATURE_IP_ROUTE_DIR \"\""
              "CONFIG_SHA1_SMALL 1"
              "CONFIG_DHCP6C y"
              "CONFIG_FEATURE_UDHCPC_SANITIZEOPT y"
              "CONFIG_FEATURE_UDHCP_RFC3397 y"
              "CONFIG_FEATURE_UDHCP_RFC5969 y"
              # [新增] NTP 時間伺服器 (增強內網對時)
              "CONFIG_NTPD y"
              "CONFIG_FEATURE_NTPD_SERVER y"
              # [新增] IPCALC 進階計算 (確保所有腳本 100% 相容)
              "CONFIG_IPCALC y"
              "CONFIG_FEATURE_IPCALC_LONG_OPTIONS y"
              "CONFIG_FEATURE_IPCALC_FANCY y"
              # [移除] 移至 UNSET 以避免衝突/iproute2-5.12.0/ip
              # "CONFIG_IPNEIGH y"
              # "CONFIG_FEATURE_IP_NEIGH y"
              "CONFIG_NC y"
              "CONFIG_NC_SERVER y"
              "CONFIG_NC_EXTRA y"
              "CONFIG_FEATURE_NSLOOKUP_BIG y"
              "CONFIG_FEATURE_NSLOOKUP_LONG_OPTIONS y"
              "CONFIG_FEATURE_NTP_AUTH y"
              "CONFIG_SSL_CLIENT y"
              # [移除] 移至 UNSET 以避免衝突/iproute2-5.12.0/tc
              # "CONFIG_TC y"
              # "CONFIG_FEATURE_TC_INGRESS y"
              "CONFIG_TLS y"
              "CONFIG_SVC y"
              "CONFIG_SVOK y"
              
              # WGET
              "CONFIG_WGET y"
              "CONFIG_FEATURE_WGET_LONG_OPTIONS y"
              "CONFIG_FEATURE_WGET_STATUSBAR y"
              "CONFIG_FEATURE_WGET_AUTHENTICATION y"
              "CONFIG_FEATURE_WGET_TIMEOUT y"
              "CONFIG_FEATURE_WGET_HTTPS y"
              "CONFIG_FEATURE_WGET_OPENSSL y"
              
              # Loop & Core
              "CONFIG_NO_LOOP_CONFIGURE y"
              # [移除] MIPS 架構不支援 x86 優化
              # "CONFIG_STACK_OPTIMIZATION_386 y"
              "CONFIG_BZIP2_SMALL 9"
              "CONFIG_CRC32 y"
              "CONFIG_FEATURE_CP_REFLINK y"
              # [移除] 因數分解，路由器用不到
              # "CONFIG_FACTOR y"
              "CONFIG_LINK y"
              "CONFIG_SHA256SUM y"
              "CONFIG_NL y"
              "CONFIG_NOHUP y"
              "CONFIG_NPROC y"
              "CONFIG_PASTE y"
              "CONFIG_SHRED y"
              "CONFIG_TEST1 y"
              "CONFIG_TEST2 y"
              "CONFIG_TSORT y"
              "CONFIG_BB_ARCH y"
              "CONFIG_BASE32 y"
              "CONFIG_BASE64 y"
              # [移除] 路由器不支援休眠喚醒
              # "CONFIG_RESUME y"
              "CONFIG_RUN_INIT y"
              "CONFIG_FEATURE_XARGS_SUPPORT_PARALLEL y"
              "CONFIG_FEATURE_XARGS_SUPPORT_ARGS_FILE y"
              "CONFIG_POWEROFF y"
              "CONFIG_REBOOT y"
              "CONFIG_FEATURE_WAIT_FOR_INIT y"
              "CONFIG_LINUXRC y"
              "CONFIG_FEATURE_INIT_QUIET y"
              "CONFIG_FEATURE_INIT_MODIFY_CMDLINE y"
              "CONFIG_MKPASSWD y"
              "CONFIG_MODINFO y"
              # [移除] Flash 不支援 TRIM
              # "CONFIG_BLKDISCARD y"
              # [移除] 路由器檔案系統通常不需預分配
              # "CONFIG_FALLOCATE y"
              # "CONFIG_FSFREEZE y"
              "CONFIG_GETOPT y"
              "CONFIG_FEATURE_GETOPT_LONG y"
              "CONFIG_HEXDUMP y"
              "CONFIG_XXD y"
              "CONFIG_FEATURE_MDEV_DAEMON y"
              "CONFIG_MKE2FS y"
              "CONFIG_MKDOSFS y"
              # [移除] 架構錯誤，MIPS 不需要這些
              # "CONFIG_LINUX32 y"
              # "CONFIG_LINUX64 y"
              # [移除] 容器相關，MIPS 效能差且少用
              # "CONFIG_SETPRIV y"
              # "CONFIG_FEATURE_SETPRIV_DUMP y"
              # "CONFIG_FEATURE_SETPRIV_CAPABILITIES y"
              # "CONFIG_FEATURE_SETPRIV_CAPABILITY_NAMES y"
              # "CONFIG_UNSHARE y"
              "CONFIG_BC y"
              "CONFIG_FEATURE_DC_BIG y"
              "CONFIG_FEATURE_BC_INTERACTIVE y"
              "CONFIG_FEATURE_BC_LONG_OPTIONS y"
              "CONFIG_FEATURE_CROND_SPECIAL_TIMES y"
              "CONFIG_GETFATTR y"
              "CONFIG_HEXEDIT y"
              # [移除] 無 I2C 硬體支援
              # "CONFIG_I2CTRANSFER y"
              "CONFIG_LSSCSI y"
              "CONFIG_MIM y"
              "CONFIG_PARTPROBE y"
              "CONFIG_SEEDRNG y"
              "CONFIG_SETFATTR y"
              "CONFIG_TS y"
              "CONFIG_UBIRENAME y"
              
              # User Preferences
              "CONFIG_FEATURE_TAR_LONG_OPTIONS y"
              "CONFIG_FEATURE_SORT_OPTIMIZE_MEMORY y"
              "CONFIG_FEATURE_SHOW_SCRIPT y"
              "CONFIG_FLOAT_DURATION y"
              "CONFIG_NOLOGIN y"
              # [移除] 僅供除錯，極少使用
              # "CONFIG_NSENTER y"
              "CONFIG_FEATURE_START_STOP_DAEMON_LONG_OPTIONS y"
              "CONFIG_FEATURE_SWAPON_PRI y"
              "CONFIG_FEATURE_ETC_SERVICES y"
              "CONFIG_FEATURE_CATN y"
              "CONFIG_FEATURE_CATV y"
              
              # Volume IDs
              # [移除] 路由器極少用到這些檔案系統，節省空間
              # "CONFIG_FEATURE_VOLUMEID_BCACHE y"
              # "CONFIG_FEATURE_VOLUMEID_EROFS y"
              # "CONFIG_FEATURE_VOLUMEID_MINIX y"
              "CONFIG_FEATURE_VOLUMEID_UBIFS y"
              "CONFIG_FEATURE_VOLUMEID_XFS y"
          )
          
          CHECKS_UNSET=(
              "CONFIG_SH_IS_HUSH"
              "CONFIG_BASH_IS_HUSH"
              "CONFIG_BASH_IS_NONE"
              "CONFIG_HUSH"
              "CONFIG_FEATURE_DHCP6_AUTH"
              "CONFIG_TRY_LOOP_CONFIGURE"
              "CONFIG_LOOP_CONFIGURE"
              "CONFIG_FEATURE_WGET_FTP"
              "CONFIG_WHOIS"
              "CONFIG_UDHCPD"
              "CONFIG_FEATURE_UDHCPD_BOOTP"
              "CONFIG_FEATURE_UDHCPD_BASE_IP_ON_MAC"
              "CONFIG_FEATURE_UDHCPD_WRITE_LEASES_EARLY"
              "CONFIG_DUMPLEASES"
              "CONFIG_DHCPRELAY"
              "CONFIG_UDHCPC6"
              "CONFIG_FEATURE_UDHCPC6_RFC3646"
              "CONFIG_FEATURE_UDHCPC6_RFC4704"
              "CONFIG_FEATURE_UDHCPC6_RFC4833"
              "CONFIG_FEATURE_UDHCPC6_RFC5970"
              "CONFIG_FEATURE_UDHCP_PORT"
              "CONFIG_FEATURE_UDHCP_8021Q"
              "CONFIG_ASH_BASH_SOURCE_CURDIR"
              
              # --- [新增] 避免衝突/iproute2-5.12.0/ip & /iproute2-5.12.0/tc & 強化資安 (強制關閉) ---
              # --- [新增] 避免衝突→<確保：「CONFIG_FEATURE_NTPD_CONF is not set」>Padavan 的系統架構中，ntpd 是由 rc 程式透過指令列參數（Command Line Arguments）直接啟動的（例如 ntpd -n -l -p ...）。它不會去讀取 /etc/ntp.conf。如果您開啟了這個選項，BusyBox 反而會因為找不到設定檔而報錯，或者忽略啟動參數。所以必須關閉（UNSET）。
              "CONFIG_FEATURE_NTPD_CONF"
              # IP 主程式與功能 (全殺，因為有 iproute2)
              "CONFIG_IP"
              "CONFIG_IPADDR"
              "CONFIG_IPLINK"
              "CONFIG_IPROUTE"
              "CONFIG_IPTUNNEL"
              "CONFIG_IPRULE"
              "CONFIG_IPNEIGH"
              
              # IP 詳細功能設定 (全殺)
              "CONFIG_FEATURE_IP_ADDRESS"
              "CONFIG_FEATURE_IP_LINK"
              
              # [💀 導致編譯失敗 Error 1 的兇手]
              "CONFIG_FEATURE_IP_LINK_CAN"
              
              # IP 其他功能與協定
              "CONFIG_FEATURE_IP_ROUTE"
              "CONFIG_FEATURE_IP_TUNNEL"
              "CONFIG_FEATURE_IP_RULE"
              "CONFIG_FEATURE_IP_NEIGH"
              "CONFIG_FEATURE_IP_RARE_PROTOCOLS"
              
              # TC 流量控制 (全殺，因為有 iproute2)
              "CONFIG_TC"
              "CONFIG_FEATURE_TC_INGRESS"
              
              # 舊式服務與資安風險 (建議關閉)
              "CONFIG_TCPSVD"
              "CONFIG_UDPSVD"
              
              # --- [新增] 架構與垃圾清理 (強制關閉) ---
              "CONFIG_STACK_OPTIMIZATION_386"
              "CONFIG_RESUME"
              "CONFIG_BLKDISCARD"
              "CONFIG_LINUX32"
              "CONFIG_LINUX64"
              "CONFIG_SETPRIV"
              "CONFIG_UNSHARE"
              "CONFIG_NSENTER"
              "CONFIG_I2CTRANSFER"
              "CONFIG_FALLOCATE"
              "CONFIG_FSFREEZE"
              "CONFIG_FEATURE_VOLUMEID_BCACHE"
              "CONFIG_FEATURE_VOLUMEID_EROFS"
              "CONFIG_FEATURE_VOLUMEID_MINIX"
          )

          # -------------------------------------------------------
          # 3. 核心功能函式
          # -------------------------------------------------------
          audit_config() {
              local FILE=$1
              local LIST_NAME=$2 
              local FAILURES=()
              echo "   🔍 Auditing $FILE..."
              if [ ! -f "$FILE" ]; then echo "      ❌ File missing: $FILE"; return 1; fi
              
              for ENTRY in "${CHECKS_SET[@]}"; do
                  KEY=${ENTRY%% *}
                  VAL=${ENTRY#* }
                  if ! grep -q "^${KEY}=${VAL}$" "$FILE"; then
                      echo "      ❌ [FAIL] $KEY mismatch/missing"
                      FAILURES+=("$ENTRY")
                  fi
              done
              
              for KEY in "${CHECKS_UNSET[@]}"; do
                  if grep -q "^${KEY}=" "$FILE"; then
                      echo "      ❌ [FAIL] $KEY is SET (Should be UNSET)"
                      FAILURES+=("$KEY UNSET")
                  fi
              done
              
              if [ ${#FAILURES[@]} -gt 0 ]; then
                  eval "$LIST_NAME=(\"\${FAILURES[@]}\")"
                  return 1
              fi
              return 0
          }

          apply_fixes() {
              local FILE=$1
              local ITEMS=("${@:2}")
              echo "   🛠️ Applying Fixes to $FILE..."
              for ITEM in "${ITEMS[@]}"; do
                  if [[ "$ITEM" == *" UNSET" ]]; then
                      KEY=${ITEM% UNSET}
                      sed -i "/$KEY/d" "$FILE"
                      echo "# $KEY is not set" >> "$FILE"
                  else
                      KEY=${ITEM%% *}
                      VAL=${ITEM#* }
                      sed -i "/$KEY/d" "$FILE"
                      echo "$KEY=$VAL" >> "$FILE"
                  fi
              done
          }

          # =======================================================
          # 4. 執行流程
          # =======================================================
          echo "🏗️ [PHASE 1] Source Code Swap"
          rm -rf "$TARGET_DIR"
          cp -rf "$SOURCE_DIR" "$TARGET_DIR"
          cd "$TARGET_DIR"
          [ -d "busybox-1.37.0" ] && cd "busybox-1.37.0"

          echo "🔧 [PHASE 2] Config Evolution"
          cp -f "$ORIGINAL_CONFIG" .config
          yes "" | make oldconfig || true

          # 4.3 [SMART CLEAN] 智慧清理 (防止重複定義)
          echo "   -> Cleaning ALL target keys to prevent reassign warnings..."
          for ENTRY in "${CHECKS_SET[@]}"; do
              KEY=${ENTRY%% *}
              sed -i "/$KEY/d" .config
          done
          for KEY in "${CHECKS_UNSET[@]}"; do
              sed -i "/$KEY/d" .config
          done
          echo "   ✅ Clean complete."

          # 4.4 [INJECT] 注入設定
          echo "   -> Injecting Specs..."
          {
              echo "# --- Custom Injection Start ---"
              for ENTRY in "${CHECKS_SET[@]}"; do
                  KEY=${ENTRY%% *}
                  VAL=${ENTRY#* }
                  echo "$KEY=$VAL"
              done
              for KEY in "${CHECKS_UNSET[@]}"; do
                  echo "# $KEY is not set"
              done
              echo "# --- Custom Injection End ---"
          } >> .config

          # 4.5 整合
          yes "" | make oldconfig || true

          # =======================================================
          # 5. [IRONCLAD AUDIT] 本地驗證迴圈
          # =======================================================
          echo "🔍 [PHASE 3] Local Audit Loop (.config)"
          CURRENT_FILE=".config"
          
          # Round 1
          FAIL_LIST_1=()
          if ! audit_config "$CURRENT_FILE" FAIL_LIST_1; then
              echo "⚠️ Round 1 Failed. Fix count: ${#FAIL_LIST_1[@]}"
              apply_fixes "$CURRENT_FILE" "${FAIL_LIST_1[@]}"
          else
              echo "✅ Round 1 Passed."
          fi
          
          # Round 2
          FAIL_LIST_2=()
          if ! audit_config "$CURRENT_FILE" FAIL_LIST_2; then
              echo "⚠️ Round 2 Failed. Fix count: ${#FAIL_LIST_2[@]}"
              apply_fixes "$CURRENT_FILE" "${FAIL_LIST_2[@]}"
          else
              echo "✅ Round 2 Passed."
          fi
          
          # Round 3
          FAIL_LIST_3=()
          if ! audit_config "$CURRENT_FILE" FAIL_LIST_3; then
              echo "⛔ FATAL: Round 3 Failed!"
              printf '   - %s\n' "${FAIL_LIST_3[@]}"
              exit 1
          fi
          echo "✅ Round 3 Passed. Config is Perfect."

          # =======================================================
          # 6. [SYNC & FULL VERIFY] 同步 + 逐一驗證
          # =======================================================
          echo "🌍 [PHASE 4] Sync & Global Verify"
          
          echo "   -> Propagating to Targets..."
          cp -f .config "$SYNC_TARGET_2"
          cp -f .config "$SYNC_TARGET_3"
          
          ALL_TARGETS=("$SYNC_TARGET_1" "$SYNC_TARGET_2" "$SYNC_TARGET_3")
          
          for TARGET in "${ALL_TARGETS[@]}"; do
              echo "   ----------------------------------------"
              echo "   🔍 Final Audit for: $TARGET"
              FINAL_FAILS=()
              if ! audit_config "$TARGET" FINAL_FAILS; then
                  echo "❌ FATAL ERROR: Verification Failed on $TARGET"
                  printf '   - %s\n' "${FINAL_FAILS[@]}"
                  exit 1
              else
                  echo "✅ Verified: $TARGET"
              fi
          done
          echo "✅ All 3 Targets are 100% Synchronized and Verified."

          # =======================================================
          # 7. [CODE & BUILD] 程式碼與依賴驗證
          # =======================================================
          echo "💉 [PHASE 5] Code & Build Verify"
          
          cd "$REPO_ROOT/trunk/user/rc"
          RC_FILE="services.c" 
          PATCH_FILE="services_syslogd_fix.patch"
          
          if [ -f "$RC_FILE" ]; then
              if grep -F "NULL,				/* -L */" "$RC_FILE"; then
                  cat << 'END_PATCH' > "$PATCH_FILE"
          --- services.c.orig
          +++ services.c
          @@ -55,7 +55,7 @@
           		"-S",				/* smaller output */
           		"-D",				/* drop duplicates */
           		"-O", "/tmp/syslog.log",	/* syslog file */
          -		NULL,				/* -L */
          +		"-L",				/* log locally */
           		NULL, NULL,			/* -R host:port */
           		NULL
           	};
          @@ -65,7 +65,6 @@
           	if (is_valid_ipv4(log_ipaddr)) {
           		int log_port = nvram_safe_get_int("log_port", 514, 1, 65535);
           		snprintf(host_dst, sizeof(host_dst), "%s:%d", log_ipaddr, log_port);
          -		syslogd_argv[7] = "-L";		/* local & remote */
           		syslogd_argv[8] = "-R";
           		syslogd_argv[9] = host_dst;
           	}
          END_PATCH
                  patch -l -F 5 -N < "$PATCH_FILE"
                  rm "$PATCH_FILE"
              fi
              
              if ! grep -F '"-L",' "$RC_FILE"; then echo "❌ Patch Failed!"; exit 1; fi
              if grep -q 'syslogd_argv\[7\]' "$RC_FILE"; then echo "❌ Old code remains!"; exit 1; fi
              echo "✅ Code Patch Verified."
          fi

          cd "$REPO_ROOT/trunk"
          grep -rl "busybox-1.24.x" user/ | xargs -r sed -i "s/busybox-1.24.x/busybox-1.37.0/g"
          grep -rl "busybox-1.24.2" user/ | xargs -r sed -i "s/busybox-1.24.2/busybox-1.37.0/g"
          find . -maxdepth 1 -name "*.sh" -o -name "build_firmware*" | while read -r script; do
             if grep -q 'busybox_id="1.24.x"' "$script"; then
                sed -i 's/busybox_id="1.24.x"/busybox_id="1.37.0"/' "$script"
             fi
          done
          
          if [ $(grep -r "busybox-1.24.x" user/ | wc -l) -ne 0 ]; then
              echo "❌ Build script cleanup failed!"
              exit 1
          fi
          echo "✅ Build System Verified (No old versions found)."

          # =======================================================
          # 8. [SECURITY] CVE-2025-60876 & CVE-2025-46394
          # =======================================================
          echo "🛡️ [PHASE 7] Applying Security Patches"
          
          # 1. 進入 busybox 源碼目錄
          # 注意：此時我們在 trunk 目錄 (PHASE 6 結束位置)，所以要進 user/busybox
          cd user/busybox
          
          # 進入版本號目錄 (如果存在)
          if [ -d "busybox-1.37.0" ]; then cd "busybox-1.37.0"; fi
          
          # 2. 建立 patches 專用目錄
          echo "   -> Creating 'patches' directory..."
          mkdir -p patches

          # -------------------------------------------------------
          # [Patch 1] CVE-2025-60876: Wget Header Injection
          # -------------------------------------------------------
          cat << 'CVE_PATCH_1' > patches/CVE-2025-60876.patch
          From: Radoslav Kolev <radoslav.kolev@suse.com>
          Subject: [PATCH] wget: don't allow control characters or spaces in the URL

          Fixes CVE-2025-60876 malicious URL can be used to inject
          HTTP headers in the request.

          ---
           networking/wget.c | 9 +++++++++
           1 file changed, 9 insertions(+)

          diff --git a/networking/wget.c b/networking/wget.c
          index ec3767793..b8a6d02bb 100644
          --- a/networking/wget.c
          +++ b/networking/wget.c
          @@ -536,6 +536,15 @@ static void parse_url(const char *src_url, struct host_info *h)
           {
           	char *url, *p, *sp;
           
          +	/* Fix for CVE-2025-60876 - don't allow control characters or spaces in the URL */
          +	/* otherwise a malicious URL can be used to inject HTTP headers in the request */
          +	unsigned char *u = (void *) src_url;
          +	while (*u) {
          +		if (*u <= ' ')
          +			bb_simple_error_msg_and_die("Unencoded control character found in the URL!");
          +		u++;
          +	}
          +
           	free(h->allocated);
           	h->allocated = url = xstrdup(src_url);
          CVE_PATCH_1

          echo "   -> Applying patches/CVE-2025-60876.patch..."
          patch -p1 -N -i patches/CVE-2025-60876.patch || echo "⚠️ CVE-2025-60876 patch fuzzy/already applied."

          # -------------------------------------------------------
          # [Patch 2] CVE-2025-46394: Libarchive Terminal Injection (V2)
          # 已移除 testsuite 測試腳本，只修復核心 .c 檔案
          # -------------------------------------------------------
          cat << 'CVE_PATCH_2' > patches/CVE-2025-46394.patch
          From: Denys Vlasenko <vda.linux@googlemail.com>
          Subject: [PATCH] archival/libarchive: sanitize filenames on output

          This fixes CVE-2025-46394 (terminal escape sequence injection)

          ---
           archival/libarchive/header_list.c         | 2 +-
           archival/libarchive/header_verbose_list.c | 4 ++--
           2 files changed, 3 insertions(+), 3 deletions(-)

          diff --git a/archival/libarchive/header_list.c b/archival/libarchive/header_list.c
          index 0621aa406..9490b3635 100644
          --- a/archival/libarchive/header_list.c
          +++ b/archival/libarchive/header_list.c
          @@ -8,5 +8,5 @@
           void FAST_FUNC header_list(const file_header_t *file_header)
           {
           //TODO: cpio -vp DIR should output "DIR/NAME", not just "NAME" */
          -	puts(file_header->name);
          +	puts(printable_string(file_header->name));
           }
          diff --git a/archival/libarchive/header_verbose_list.c b/archival/libarchive/header_verbose_list.c
          index a575a08a0..e7a09430d 100644
          --- a/archival/libarchive/header_verbose_list.c
          +++ b/archival/libarchive/header_verbose_list.c
          @@ -57,13 +57,13 @@ void FAST_FUNC header_verbose_list(const file_header_t *file_header)
           		ptm->tm_hour,
           		ptm->tm_min,
           		ptm->tm_sec,
          -		file_header->name);
          +		printable_string(file_header->name));
           
           #endif /* FEATURE_TAR_UNAME_GNAME */
           
           	/* NB: GNU tar shows "->" for symlinks and "link to" for hardlinks */
           	if (file_header->link_target) {
          -		printf(" -> %s", file_header->link_target);
          +		printf(" -> %s", printable_string(file_header->link_target));
           	}
           	bb_putchar('\n');
           }
          CVE_PATCH_2

          echo "   -> Applying patches/CVE-2025-46394.patch..."
          patch -p1 -N -i patches/CVE-2025-46394.patch || echo "⚠️ CVE-2025-46394 patch fuzzy/already applied."

          set +x
          echo "🎉 BusyBox 1.37.0 Evolution Complete (V43: Ultimate Logic)."
          echo "::endgroup::"

      # =======================================================
      # [步驟 C] 同步 libmnl (重複利用同一個來源)
      # =======================================================
